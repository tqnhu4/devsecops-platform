apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: observability
  namespace: argocd

spec:
  project: platform

  source:
    repoURL: https://github.com/tqnhu4/devsecops-platform.git
    targetRevision: main
    path: platform/observability

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true