name: Secret Scanning

on:

  push:
    branches:
      - main

  pull_request:

jobs:

  gitleaks:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}