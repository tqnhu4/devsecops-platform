apiVersion: monitoring.coreos.com/v1

kind: PrometheusRule

metadata:

  name: ingress-latency

  namespace: monitoring

spec:

  groups:

  - name: ingress

    rules:

    - alert: HighIngressLatency

      expr: |

        histogram_quantile(

        0.95,

        sum(

        rate(

        nginx_ingress_controller_request_duration_seconds_bucket[5m]

        )

        )

        by (le)

        )

        > 1

      for: 5m

      labels:

        severity: warning

      annotations:

        summary: High Ingress Latency

        description: P95 latency > 1 second