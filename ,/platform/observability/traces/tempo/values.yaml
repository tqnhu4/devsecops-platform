tempo:

  metricsGenerator:

    enabled: true

    storage:

      path: /var/tempo/generator

    remoteWrite:

      - url: http://monitoring-prometheus:9090/api/v1/write

  overrides:

      defaults:

        metrics_generator:

          processors:

            - service-graphs

            - span-metrics    

persistence:

  enabled: true

  size: 20Gi

serviceMonitor:

  enabled: true

traces:

  otlp:

    grpc:

      enabled: true

    http:

      enabled: true