apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: web-frontend
  namespace: web

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-frontend

  minReplicas: 2
  maxReplicas: 5

  metrics:
    - type: Resource

      resource:
        name: cpu

        target:
          type: Utilization
          averageUtilization: 70