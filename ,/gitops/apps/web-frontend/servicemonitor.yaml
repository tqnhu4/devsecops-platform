apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: web-frontend
  namespace: monitoring

  labels:
    release: monitoring

spec:
  selector:
    matchLabels:
      app: web-frontend

  namespaceSelector:
    matchNames:
      - web

  endpoints:
    - port: http
      path: /
      interval: 30s