apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret

metadata:
  name: web-secret
  namespace: web

spec:
  refreshInterval: 1h

  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  target:
    name: web-secret

  data:
    - secretKey: password

      remoteRef:
        key: web/password