apiVersion: apps/v1
kind: DaemonSet

metadata:
  name: fluent-bit
  namespace: logging

spec:
  selector:
    matchLabels:
      app: fluent-bit

  template:
    metadata:
      labels:
        app: fluent-bit

    spec:
      containers:
        - name: fluent-bit

          image: fluent/fluent-bit:latest1

          volumeMounts:
            - name: varlog
              mountPath: /var/log

      volumes:
        - name: varlog
          hostPath:
            path: /var/log