apiVersion: kyverno.io/v1
kind: ClusterPolicy

metadata:
  name: require-security-context

spec:
  validationFailureAction: enforce

  rules:
    - name: security-context

      match:
        any:
          - resources:
              kinds:
                - Pod

      validate:
        message: "SecurityContext required"

        pattern:
          spec:
            securityContext:
              runAsNonRoot: true