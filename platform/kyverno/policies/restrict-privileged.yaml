apiVersion: kyverno.io/v1
kind: ClusterPolicy

metadata:
  name: restrict-privileged

spec:
  validationFailureAction: enforce

  rules:
    - name: privileged-disabled

      match:
        any:
          - resources:
              kinds:
                - Pod

      validate:
        message: "Privileged containers are forbidden"

        pattern:
          spec:
            containers:
              - securityContext:
                  privileged: false