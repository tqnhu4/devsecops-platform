apiVersion: kyverno.io/v1
kind: ClusterPolicy

metadata:
  name: restrict-capabilities

spec:
  validationFailureAction: enforce

  rules:
    - name: drop-capabilities

      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob

      exclude:
        any:
          - resources:
              namespaces:
                - kyverno
                - kube-system
                - argocd
                - falco
                - monitoring                

      validate:
        message: "All capabilities must be dropped"

        pattern:
          spec:
            template:
              spec:          
                containers:
                  - securityContext:
                      runAsNonRoot: true
                      privileged: false
                      capabilities:
                        drop:
                          - ALL