apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig

metadata:
  name: slack
  namespace: monitoring

spec:

  templates:

  - '/etc/alertmanager/templates/*.tmpl'

  route:
    receiver: slack
    
  receivers:

  - name: slack

    slackConfigs:

      - apiURL:
          name: alertmanager-slack
          key: api_url

        channel: "#alerts"

        sendResolved: true

        title: '{{ template "slack.title" . }}'

        text: '{{ template "slack.body" . }}'