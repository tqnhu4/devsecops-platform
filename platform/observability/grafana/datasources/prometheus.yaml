apiVersion: v1

kind: ConfigMap

metadata:

  name: grafana-datasource-prometheus

  namespace: monitoring

  labels:

    grafana_datasource: "1"

data:

  datasource.yaml: |

    apiVersion: 1

    datasources:

    - name: Prometheus

      type: prometheus

      access: proxy

      url: http://monitoring-prometheus:9090

      isDefault: true