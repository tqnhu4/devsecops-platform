apiVersion: v1

kind: ConfigMap

metadata:

  name: otel-collector-config

  namespace: monitoring

data:

  collector.yaml: |

    receivers:

      otlp:

        protocols:

          grpc:

          http:

    processors:

      batch:

    exporters:

      otlp:

        endpoint: tempo:4317

        tls:

          insecure: true

    service:

      pipelines:

        traces:

          receivers:

          - otlp

          processors:

          - batch

          exporters:

          - otlp