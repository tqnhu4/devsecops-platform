deploymentMode: SingleBinary

loki:

  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:

    configs:

      - from: "2024-01-01"

        store: tsdb

        object_store: filesystem

        schema: v13

        index:

          prefix: loki_index_

          period: 24h

  storage:

    type: filesystem

  storage_config:

    filesystem:

      directory: /var/loki/chunks

  limits_config:

    retention_period: 168h

singleBinary:

  replicas: 1

  persistence:

    enabled: true

    size: 20Gi

backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

gateway:
  enabled: false

ingester:
  replicas: 0

querier:
  replicas: 0

queryFrontend:
  replicas: 0

queryScheduler:
  replicas: 0

distributor:
  replicas: 0

compactor:
  replicas: 0

indexGateway:
  replicas: 0

bloomCompactor:
  replicas: 0

bloomGateway:
  replicas: 0

monitoring:

  serviceMonitor:

    enabled: true