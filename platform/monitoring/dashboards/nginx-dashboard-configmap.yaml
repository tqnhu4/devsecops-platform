apiVersion: v1
kind: ConfigMap

metadata:
  name: nginx-dashboard
  namespace: monitoring

  labels:
    grafana_dashboard: "1"

data:
  nginx.json: |
    {
      "title": "NGINX Ingress Dashboard",

      "timezone": "browser",

      "schemaVersion": 38,

      "version": 1,

      "panels": [

        {
          "type": "graph",

          "title": "HTTP Requests",

          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 12,
            "h": 8
          },

          "targets": [
            {
              "expr": "sum(rate(nginx_ingress_controller_requests[1m]))"
            }
          ]
        },

        {
          "type": "graph",

          "title": "Ingress Latency",

          "gridPos": {
            "x": 12,
            "y": 0,
            "w": 12,
            "h": 8
          },

          "targets": [
            {
              "expr": "histogram_quantile(0.95, rate(nginx_ingress_controller_request_duration_seconds_bucket[5m]))"
            }
          ]
        }
      ]
    }