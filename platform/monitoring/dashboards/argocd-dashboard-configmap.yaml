apiVersion: v1
kind: ConfigMap

metadata:
  name: argocd-dashboard
  namespace: monitoring

  labels:
    grafana_dashboard: "1"

data:
  argocd.json: |
    {
      "title": "ArgoCD Dashboard",

      "timezone": "browser",

      "schemaVersion": 38,

      "version": 1,

      "panels": [

        {
          "type": "stat",

          "title": "Applications Synced",

          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 8,
            "h": 4
          },

          "targets": [
            {
              "expr": "count(argocd_app_info)"
            }
          ]
        },

        {
          "type": "graph",

          "title": "Reconciliation Duration",

          "gridPos": {
            "x": 8,
            "y": 0,
            "w": 16,
            "h": 8
          },

          "targets": [
            {
              "expr": "rate(argocd_app_reconcile_bucket[5m])"
            }
          ]
        }
      ]
    }