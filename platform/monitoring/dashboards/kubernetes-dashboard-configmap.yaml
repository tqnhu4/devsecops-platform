apiVersion: v1
kind: ConfigMap
metadata:
  name: kubernetes-dashboard
  namespace: monitoring

  labels:
    grafana_dashboard: "1"

data:
  kubernetes.json: |
    {
      "title": "Kubernetes Cluster Overview",

      "timezone": "browser",

      "schemaVersion": 38,

      "version": 1,

      "panels": [

        {
          "type": "stat",

          "title": "Running Pods",

          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 6,
            "h": 4
          },

          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase='Running'})"
            }
          ]
        },

        {
          "type": "stat",

          "title": "Cluster CPU Usage",

          "gridPos": {
            "x": 6,
            "y": 0,
            "w": 6,
            "h": 4
          },

          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total[5m]))"
            }
          ]
        },

        {
          "type": "graph",

          "title": "Memory Usage",

          "gridPos": {
            "x": 0,
            "y": 4,
            "w": 12,
            "h": 8
          },

          "targets": [
            {
              "expr": "sum(container_memory_usage_bytes)"
            }
          ]
        }
      ]
    }