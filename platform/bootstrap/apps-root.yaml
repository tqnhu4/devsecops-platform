apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: web-frontend
  namespace: argocd

spec:
  #project: applications
  project: platform

  source:
    repoURL: https://github.com/tqnhu4/devsecops-platform.git
    targetRevision: main
    path: gitops/environments/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: web

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true