apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: apps-root
  namespace: argocd

spec:
  project: applications

  source:
    repoURL: https://github.com/tqnhu4/devsecops-platform.git
    targetRevision: main
    path: gitops/apps

  destination:
    server: https://kubernetes.default.svc
    namespace: web

  syncPolicy:
    automated:
      prune: true
      selfHeal: true