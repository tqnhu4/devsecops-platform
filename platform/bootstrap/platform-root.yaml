apiVersion: argoproj.io/v1alpha1
kind: AppProject

metadata:
  name: platform-root
  namespace: argocd

spec:
  project: platform

  source:
    repoURL: https://github.com/tqnhu4/devsecops-platform.git
    targetRevision: main
    #path: platform
    path: gitops/argocd

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  clusterResourceWhitelist:
    - group: '*'
      kind: '*'    

  syncPolicy:
    automated:
      prune: true
      selfHeal: true